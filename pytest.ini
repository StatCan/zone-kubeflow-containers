[pytest]
addopts = -ra
log_cli = 1
log_cli_level = DEBUG
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s (%(filename)s:%(lineno)s)
log_cli_date_format=%Y-%m-%d %H:%M:%S
markers =
    smoke: marks tests as smoke tests (critical path tests)
    integration: marks tests as integration tests (tests requiring Docker)
    slow: marks tests as slow (long-running tests)
    info: marks tests as info (deselect with '-m "not info"')